<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>영업 일일보고</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f4f7f5;
      --panel: #ffffff;
      --line: #d9e2dc;
      --text: #17211c;
      --muted: #66736d;
      --green: #14765c;
      --green-soft: #e6f5ef;
      --blue-soft: #e7f1ff;
      --blue: #2563eb;
      --amber-soft: #fff2d8;
      --amber: #b7791f;
      --red: #c24141;
      --red-soft: #fff1f1;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Malgun Gothic", system-ui, sans-serif; }
    header { background: var(--panel); border-bottom: 1px solid var(--line); padding: 14px 16px; position: sticky; top: 0; z-index: 5; }
    h1 { margin: 0; font-size: 19px; }
    h2 { margin: 0; font-size: 17px; }
    button, input, select { font: inherit; }
    main { max-width: 1120px; margin: 0 auto; padding: 14px; display: grid; grid-template-columns: 360px 1fr; gap: 14px; }
    section, .metric, .owner-card, .report-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(27,45,37,.08);
    }
    .head { padding: 16px 16px 6px; }
    .form, .body { padding: 12px 16px 16px; display: grid; gap: 12px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; }
    input, select { width: 100%; min-height: 44px; border: 1px solid #cbd8d1; border-radius: 8px; padding: 10px 12px; background: #fff; color: var(--text); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { min-height: 42px; border: 1px solid #bfd0c8; border-radius: 8px; background: #fff; color: #0f5b47; padding: 0 13px; cursor: pointer; }
    .btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.danger { color: var(--red); border-color: #efc8c8; }
    .btn.done { background: var(--green-soft); border-color: #98d8bf; color: #0f5b47; font-weight: 800; }
    .btn.pending { background: var(--red-soft); border-color: #efb8b8; color: #b42323; font-weight: 800; }
    .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px; border: 1px solid #cbd8d1; border-radius: 8px; }
    .seg button { border: 0; border-radius: 6px; background: #fff; color: var(--muted); min-height: 38px; cursor: pointer; }
    .seg button.active { background: var(--green); color: #fff; font-weight: 800; }
    .quick-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .amount-wrap { position: relative; }
    .amount-wrap input { padding-right: 54px; }
    .amount-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
    .helper { color: var(--muted); font-size: 12px; margin-top: -4px; }
    .toast { min-height: 22px; color: #0f5b47; font-size: 13px; }
    .status { border: 1px solid #cbd8d1; border-radius: 8px; padding: 10px 12px; background: #fbfdfc; color: var(--muted); font-size: 13px; }
    .status.ok { border-color: #98d8bf; background: #ecf9f3; color: #0f5b47; }
    .status.error { border-color: #efb8b8; background: #fff1f1; color: #b42323; }
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .metric { padding: 14px; min-height: 92px; display: grid; gap: 6px; align-content: space-between; }
    .metric span { color: var(--muted); font-size: 13px; }
    .metric strong { font-size: 22px; }
    .metric small { color: var(--muted); font-size: 13px; }
    .month-nav { display: grid; grid-template-columns: auto 1fr 170px auto auto; gap: 8px; align-items: center; }
    .month-label { min-height: 42px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 8px; background: #fff; font-weight: 800; }
    .owner-grid { display: grid; gap: 1px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--line); }
    .owner-card { box-shadow: none; border: 0; border-radius: 0; overflow: hidden; }
    .owner-button {
      width: 100%;
      min-height: 46px;
      border: 0;
      background: #fff;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: minmax(70px, 1fr) auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      cursor: pointer;
    }
    .owner-button.active { background: var(--green-soft); }
    .owner-name { font-size: 15px; font-weight: 900; color: var(--text); }
    .owner-line { font-size: 15px; color: var(--text); white-space: nowrap; }
    .owner-detail-summary { display: none; grid-template-columns: 1fr 1fr auto; gap: 8px; padding: 10px; border-top: 1px solid var(--line); background: #fbfdfc; }
    .owner-card.open .owner-detail-summary { display: grid; }
    .detail-metric { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 10px; display: grid; gap: 4px; text-align: left; cursor: pointer; }
    .detail-metric.active { border-color: var(--green); background: var(--green-soft); }
    .detail-metric span { color: var(--muted); font-size: 12px; }
    .detail-metric strong { font-size: 16px; }
    .detail-reset { align-self: stretch; min-width: 72px; }
    .detail-list { display: none; border-top: 1px solid var(--line); padding: 10px; gap: 8px; background: #fbfdfc; }
    .owner-card.open .detail-list { display: grid; }
    .report-card { box-shadow: none; padding: 12px; display: grid; gap: 9px; }
    .report-top { display: grid; gap: 4px; }
    .client { font-weight: 900; font-size: 16px; }
    .report-info { color: var(--muted); font-size: 13px; display: flex; gap: 8px; flex-wrap: wrap; }
    .report-bottom { display: flex; justify-content: space-between; gap: 8px; align-items: end; }
    .report-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; min-height: 25px; border-radius: 999px; padding: 0 9px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .badge.new { background: var(--blue-soft); color: var(--blue); }
    .badge.growth { background: var(--amber-soft); color: var(--amber); }
    .empty { color: var(--muted); text-align: center; padding: 24px 10px; border: 1px dashed #cbd8d1; border-radius: 8px; background: #fff; }
    .sticky-save { display: none; }
    @media (max-width: 900px) {
      main { display: block; padding-bottom: 88px; }
      .dashboard { margin-top: 14px; }
      .summary { grid-template-columns: 1fr 1fr; }
      .row, .month-nav { grid-template-columns: 1fr; }
      .quick-row { grid-template-columns: repeat(3, 1fr); }
      .owner-button { grid-template-columns: 70px 1fr; }
      .owner-line { text-align: right; font-size: 14px; }
      .owner-detail-summary { grid-template-columns: 1fr 1fr; }
      .detail-reset { grid-column: 1 / -1; }
      .report-bottom { align-items: start; }
      .report-actions .btn { min-height: 38px; padding: 0 10px; }
      .sticky-save { display: block; position: sticky; bottom: 0; z-index: 4; background: rgba(244,247,245,.94); backdrop-filter: blur(8px); padding-top: 8px; }
      .form > #submitBtn { display: none; }
    }
  </style>
</head>
<body>
  <header><h1>영업 일일보고</h1></header>
  <main>
    <section class="input-panel">
      <div class="head"><h2>거래처 입력</h2></div>
      <form class="form" id="reportForm">
        <label>담당자 이름 <input id="owner" type="text" required></label>
        <label>날짜 <input id="date" type="date" required></label>
        <label>거래처명 <input id="client" type="text" required autocomplete="off"></label>
        <label>구분
          <div class="seg">
            <button type="button" class="active" data-type="신규">신규</button>
            <button type="button" data-type="매출증대">매출증대</button>
          </div>
        </label>
        <div class="row">
          <label>품목/제품군
            <select id="product" required>
              <option value="">선택</option>
              <option value="3제+클로르">3제+클로르</option>
              <option value="3제">3제</option>
              <option value="클로르">클로르</option>
            </select>
          </label>
          <label>예상 금액
            <div class="amount-wrap">
              <input id="amount" type="text" inputmode="numeric" required autocomplete="off">
              <span class="amount-unit">만원</span>
            </div>
          </label>
        </div>
        <div class="quick-row">
          <button class="btn" type="button" data-add-amount="1">+1만</button>
          <button class="btn" type="button" data-add-amount="5">+5만</button>
          <button class="btn" type="button" data-add-amount="10">+10만</button>
          <button class="btn" type="button" data-add-amount="50">+50만</button>
          <button class="btn" type="button" data-add-amount="100">+100만</button>
        </div>
        <div class="helper" id="amountPreview">1 입력 = 10,000원</div>
        <button class="btn primary" id="submitBtn" type="submit">저장</button>
        <button class="btn" id="cancelEditBtn" type="button">입력 초기화</button>
        <div class="sticky-save"><button class="btn primary" id="stickySubmitBtn" type="button" style="width:100%;">저장</button></div>
        <div class="toast" id="toast"></div>
      </form>
    </section>

    <section class="dashboard">
      <div class="summary">
        <div class="metric"><span>전체</span><strong id="totalAmount">0원</strong><small id="totalCount">0건</small></div>
        <div class="metric"><span>신규</span><strong id="newAmount">0원</strong><small id="newCount">0건</small></div>
        <div class="metric"><span>매출증대</span><strong id="growthAmount">0원</strong><small id="growthCount">0건</small></div>
        <div class="metric"><span>목표 달성율</span><strong id="doneRate">0%</strong><small id="doneCount">목표 0원</small></div>
      </div>
      <section>
        <div class="head"><h2>담당자별 현황</h2></div>
        <div class="body">
          <div class="status" id="statusBox">연결 확인 중입니다.</div>
          <div class="month-nav">
            <button class="btn" type="button" id="prevMonthBtn">전 달</button>
            <div class="month-label" id="monthLabel">이번 달</div>
            <input id="monthPicker" type="month" aria-label="월 선택">
            <button class="btn" type="button" id="currentMonthBtn">현재</button>
            <button class="btn" type="button" id="nextMonthBtn">다음 달</button>
          </div>
          <div class="owner-grid" id="ownerCards"></div>
          <div class="empty" id="empty">아직 입력된 보고가 없습니다.</div>
        </div>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
